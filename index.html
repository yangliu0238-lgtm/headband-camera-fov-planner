  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

&lt;div id=&quot;side-camera-contour-planner&quot;&gt;

      width: 100%;

      stroke-linejoin: round;

      stroke: var(--muted-foreground);
      stroke-width: 1.2;
    }
    #side-camera-contour-planner .track {
      fill: none;
      stroke: var(--viz-series-3);
      stroke-width: 1.5;
      stroke-dasharray: 6 5;
    }
    #side-camera-contour-planner .fov-lf {
      fill: var(--viz-series-1);
      fill-opacity: 0.09;
    }
    #side-camera-contour-planner .fov-rf {
      fill: var(--viz-series-2);
      fill-opacity: 0.09;
    }
    #side-camera-contour-planner .fov-ls {
      fill: var(--viz-series-3);
      fill-opacity: 0.10;
    }
    #side-camera-contour-planner .fov-rs {
      fill: var(--viz-series-4);
      fill-opacity: 0.10;
    }
    #side-camera-contour-planner .pair-overlap {
      fill: var(--viz-series-5);
      fill-opacity: 0.34;
    }
    #side-camera-contour-planner .multi-overlap {
      fill: var(--viz-series-6);
      fill-opacity: 0.38;
    }
    #side-camera-contour-planner .ray-lf {
      stroke: var(--viz-series-1);
    }
    #side-camera-contour-planner .ray-rf {
      stroke: var(--viz-series-2);
    }
    #side-camera-contour-planner .ray-ls {
      stroke: var(--viz-series-3);
    }
    #side-camera-contour-planner .ray-rs {
      stroke: var(--viz-series-4);
    }
    #side-camera-contour-planner .fov-ray {
      stroke-width: 1.25;
    }
    #side-camera-contour-planner .camera-axis {
      stroke: var(--foreground);
      stroke-width: 1.5;
    }
    #side-camera-contour-planner .camera-body {
      fill: var(--card);
      stroke: var(--foreground);
      stroke-width: 1.5;
    }
    #side-camera-contour-planner .camera-lens {
      fill: currentColor;
    }
    #side-camera-contour-planner .cam-lf {
      color: var(--viz-series-1);
    }
    #side-camera-contour-planner .cam-rf {
      color: var(--viz-series-2);
    }
    #side-camera-contour-planner .cam-ls {
      color: var(--viz-series-3);
    }
    #side-camera-contour-planner .cam-rs {
      color: var(--viz-series-4);
    }
    #side-camera-contour-planner .tangent {
      stroke: var(--muted-foreground);
      stroke-width: 1.2;
      stroke-dasharray: 3 3;
    }
    #side-camera-contour-planner .measure {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1;
    }
    #side-camera-contour-planner .camera-baseline {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.2;
      stroke-dasharray: 4 4;
      opacity: 0.82;
    }
    #side-camera-contour-planner .whole-fov-extension {
      fill: none;
      stroke: var(--viz-series-6);
      stroke-width: 1.25;
      stroke-dasharray: 5 4;
      opacity: 0.9;
    }
    #side-camera-contour-planner .whole-fov-arc {
      fill: none;
      stroke: var(--viz-series-6);
      stroke-width: 2.2;
    }
    #side-camera-contour-planner .whole-fov-vertex {
      fill: var(--viz-series-6);
      stroke: var(--background);
      stroke-width: 2;
    }
    #side-camera-contour-planner .coordinate-axis {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 1.2;
    }
    #side-camera-contour-planner .coordinate-tick {
      stroke: var(--muted-foreground);
      stroke-width: 1;
    }
    #side-camera-contour-planner .coordinate-origin {

    }
    #side-camera-contour-planner .fov-intersection {
      fill: var(--viz-series-6);
      stroke: var(--background);
      stroke-width: 2;
    }
    #side-camera-contour-planner .label {
      fill: var(--foreground);
      font-size: var(--font-size-base);
      font-weight: 500;
    }
    #side-camera-contour-planner .secondary-label {
      fill: var(--muted-foreground);
      font-size: calc(var(--font-size-base) * 0.84);
      font-weight: 400;
    }
    #side-camera-contour-planner .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      align-items: center;
      margin: 6px 0 0;
    }
    #side-camera-contour-planner .legend-item {
      display: inline-flex;
      gap: 6px;
      align-items: center;
    }
    #side-camera-contour-planner .swatch {
      width: 18px;
      height: 10px;
      display: inline-block;
    }
    #side-camera-contour-planner .swatch-single {
      background: var(--viz-series-3);
      opacity: 0.35;
    }
    #side-camera-contour-planner .swatch-overlap {
      background: var(--viz-series-5);
      opacity: 0.65;
    }
    #side-camera-contour-planner .swatch-multi {
      background: var(--viz-series-6);
      opacity: 0.72;
    }
    #side-camera-contour-planner .section-title {
      margin: 14px 0 6px;
      font-size: calc(var(--font-size-base) * 0.92);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    #side-camera-contour-planner .intersection-list {
      font-variant-numeric: tabular-nums;
      line-height: 1.55;
    }
    #side-camera-contour-planner .whole-fov-card {

      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;

    #side-camera-contour-planner .whole-fov-card &gt; div {

      &lt;div class=&quot;table-responsive&quot;&gt;
        &lt;table class=&quot;table table-sm planner-table&quot; aria-label=&quot;相邻相机FOV边界射线的实时交点坐标&quot;&gt;
          &lt;thead&gt;&lt;tr&gt;&lt;th&gt;相邻 FOV&lt;/th&gt;&lt;th&gt;正向边界交点坐标 (mm)&lt;/th&gt;&lt;th&gt;状态&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;th scope=&quot;row&quot;&gt;LS — LF&lt;/th&gt;&lt;td id=&quot;scp-cross-ls-lf-points&quot; class=&quot;intersection-list&quot;&gt;&lt;/td&gt;&lt;td id=&quot;scp-cross-ls-lf-status&quot;&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th scope=&quot;row&quot;&gt;LF — RF&lt;/th&gt;&lt;td id=&quot;scp-cross-lf-rf-points&quot; class=&quot;intersection-list&quot;&gt;&lt;/td&gt;&lt;td id=&quot;scp-cross-lf-rf-status&quot;&gt;&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th scope=&quot;row&quot;&gt;RF — RS&lt;/th&gt;&lt;td id=&quot;scp-cross-rf-rs-points&quot; class=&quot;intersection-list&quot;&gt;&lt;/td&gt;&lt;td id=&quot;scp-cross-rf-rs-status&quot;&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;side-camera-contour-planner&#x27;);
      if (!root) return;

      const byId = (id) =&gt; root.querySelector(&#x27;#&#x27; + id);
      const scale = 1.52;
      const origin = { x: 380, y: 260 };
      const far = 2200;
      const halfFov = 40;
      const headCenter = { x: 0, y: -190 };

      const leftTrack = [
        { x: -30, y: 0 },
        { x: -50, y: -3 },
        { x: -70, y: -10 },
        { x: -88, y: -18 },
        { x: -103, y: -27 },
        { x: -112, y: -38 },
        { x: -116, y: -55 },
        { x: -118, y: -80 },
        { x: -120, y: -110 },
        { x: -124, y: -150 },
        { x: -130, y: -195 },
        { x: -132, y: -225 },
        { x: -128, y: -252 },
        { x: -115, y: -275 },
        { x: -98, y: -296 },
        { x: -78, y: -316 },
        { x: -56, y: -333 },
        { x: -32, y: -345 },
        { x: -10, y: -352 }
      ];
      const rightTrack = leftTrack.map((point) =&gt; ({ x: -point.x, y: point.y }));
      const leftOutline = [{ x: 0, y: 2 }, ...leftTrack];
      const rightOutline = [{ x: 0, y: 2 }, ...rightTrack];
      const frontCameras = {
        lf: { id: &#x27;lf&#x27;, x: -30, y: 0, yaw: 0, fov: 80 },
        rf: { id: &#x27;rf&#x27;, x: 30, y: 0, yaw: 0, fov: 80 }
      };
      const pairs = [
        [&#x27;lf&#x27;, &#x27;rf&#x27;],
        [&#x27;lf&#x27;, &#x27;ls&#x27;],
        [&#x27;lf&#x27;, &#x27;rs&#x27;],
        [&#x27;rf&#x27;, &#x27;ls&#x27;],
        [&#x27;rf&#x27;, &#x27;rs&#x27;],
        [&#x27;ls&#x27;, &#x27;rs&#x27;]
      ];
      const triples = [
        [&#x27;lf&#x27;, &#x27;rf&#x27;, &#x27;ls&#x27;],
        [&#x27;lf&#x27;, &#x27;rf&#x27;, &#x27;rs&#x27;],
        [&#x27;lf&#x27;, &#x27;ls&#x27;, &#x27;rs&#x27;],
        [&#x27;rf&#x27;, &#x27;ls&#x27;, &#x27;rs&#x27;]
      ];
      const adjacentFovPairs = [
        [&#x27;ls&#x27;, &#x27;lf&#x27;],
        [&#x27;lf&#x27;, &#x27;rf&#x27;],
        [&#x27;rf&#x27;, &#x27;rs&#x27;]
      ];

      const rad = (degrees) =&gt; degrees * Math.PI / 180;
      const deg = (radians) =&gt; radians * 180 / Math.PI;
      const wrap = (degrees) =&gt; ((degrees + 180) % 360 + 360) % 360 - 180;
      const format = (number, digits = 1) =&gt; Number(number).toFixed(digits);
      const map = (point) =&gt; ({
        x: origin.x + point.x * scale,
        y: origin.y - point.y * scale
      });
      const centeredPoint = (point) =&gt; ({
        x: point.x - headCenter.x,
        y: point.y - headCenter.y
      });

      function pathData(points, close = false) {
        const mapped = points.map(map);
        return mapped.map((point, index) =&gt; (index ? &#x27;L&#x27; : &#x27;M&#x27;) + format(point.x) + &#x27; &#x27; + format(point.y)).join(&#x27; &#x27;) + (close ? &#x27; Z&#x27; : &#x27;&#x27;);
      }

      function polylineMetrics(points) {
        const lengths = [];
        let total = 0;
        for (let index = 1; index &lt; points.length; index += 1) {
          const length = Math.hypot(points[index].x - points[index - 1].x, points[index].y - points[index - 1].y);
          lengths.push(length);
          total += length;
        }
        return { lengths, total };
      }

      function pointAtDistance(points, metrics, distance) {
        let remaining = Math.max(0, Math.min(metrics.total, distance));
        for (let index = 0; index &lt; metrics.lengths.length; index += 1) {
          const segmentLength = metrics.lengths[index];
          if (remaining &lt;= segmentLength || index === metrics.lengths.length - 1) {
            const ratio = segmentLength ? remaining / segmentLength : 0;
            const start = points[index];
            const end = points[index + 1];
            return {
              x: start.x + (end.x - start.x) * ratio,
              y: start.y + (end.y - start.y) * ratio
            };
          }
          remaining -= segmentLength;
        }
        return points[points.length - 1];
      }

      function sampleTrack(points, percent) {
        const metrics = polylineMetrics(points);
        const distance = metrics.total * Math.max(0, Math.min(100, percent)) / 100;
        const point = pointAtDistance(points, metrics, distance);
        const before = pointAtDistance(points, metrics, distance - 10);
        const after = pointAtDistance(points, metrics, distance + 10);
        const tangentLength = Math.hypot(after.x - before.x, after.y - before.y) || 1;
        const tangent = {
          x: (after.x - before.x) / tangentLength,
          y: (after.y - before.y) / tangentLength
        };
        const candidates = [
          { x: -tangent.y, y: tangent.x },
          { x: tangent.y, y: -tangent.x }
        ];
        const radial = { x: point.x - headCenter.x, y: point.y - headCenter.y };
        const normal = candidates.reduce((best, candidate) =&gt; {
          const score = candidate.x * radial.x + candidate.y * radial.y;
          return !best || score &gt; best.score ? { ...candidate, score } : best;
        }, null);
        return { point, tangent, normal: { x: normal.x, y: normal.y } };
      }

      function sideCamera(id, track) {
        const positionInput = byId(&#x27;scp-&#x27; + id + &#x27;-position&#x27;);
        const offsetInput = byId(&#x27;scp-&#x27; + id + &#x27;-offset&#x27;);
        const position = Number(positionInput.value);
        const offset = Number(offsetInput.value);
        const sampled = sampleTrack(track, position);
        const normalYaw = deg(Math.atan2(sampled.normal.x, sampled.normal.y));
        return {
          id,
          x: sampled.point.x,
          y: sampled.point.y,
          yaw: wrap(normalYaw + offset),
          normalYaw,
          offset,
          position,
          tangent: sampled.tangent,
          fov: 80
        };
      }

      function fovPolygon(camera) {
        const leftAngle = camera.yaw - camera.fov / 2;
        const rightAngle = camera.yaw + camera.fov / 2;
        return [
          { x: camera.x, y: camera.y },
          { x: camera.x + far * Math.sin(rad(rightAngle)), y: camera.y + far * Math.cos(rad(rightAngle)) },
          { x: camera.x + far * Math.sin(rad(leftAngle)), y: camera.y + far * Math.cos(rad(leftAngle)) }
        ];
      }

      function polygonArea(points) {
        return points.reduce((sum, point, index) =&gt; {
          const next = points[(index + 1) % points.length];
          return sum + point.x * next.y - next.x * point.y;
        }, 0) / 2;
      }

      function cross(a, b) {
        return a.x * b.y - a.y * b.x;
      }

      function lineIntersection(start, end, clipStart, clipEnd) {
        const subjectDirection = { x: end.x - start.x, y: end.y - start.y };
        const clipDirection = { x: clipEnd.x - clipStart.x, y: clipEnd.y - clipStart.y };
        const denominator = cross(subjectDirection, clipDirection);
        if (Math.abs(denominator) &lt; 1e-9) return end;
        const offset = { x: clipStart.x - start.x, y: clipStart.y - start.y };
        const t = cross(offset, clipDirection) / denominator;
        return {
          x: start.x + subjectDirection.x * t,
          y: start.y + subjectDirection.y * t
        };
      }

      function clipPolygon(subject, clip) {
        if (!subject.length || !clip.length) return [];
        let output = subject.slice();
        const orientation = polygonArea(clip) &gt;= 0 ? 1 : -1;
        for (let edgeIndex = 0; edgeIndex &lt; clip.length; edgeIndex += 1) {
          const clipStart = clip[edgeIndex];
          const clipEnd = clip[(edgeIndex + 1) % clip.length];
          const input = output.slice();
          output = [];
          if (!input.length) break;
          const isInside = (point) =&gt; orientation * cross(
            { x: clipEnd.x - clipStart.x, y: clipEnd.y - clipStart.y },
            { x: point.x - clipStart.x, y: point.y - clipStart.y }
          ) &gt;= -1e-8;
          let start = input[input.length - 1];
          for (const end of input) {
            const startInside = isInside(start);
            const endInside = isInside(end);
            if (endInside) {
              if (!startInside) output.push(lineIntersection(start, end, clipStart, clipEnd));
              output.push(end);
            } else if (startInside) {
              output.push(lineIntersection(start, end, clipStart, clipEnd));
            }
            start = end;
          }
        }
        return output;
      }

      function pointsAttribute(points) {
        return points.map(map).map((point) =&gt; format(point.x) + &#x27;,&#x27; + format(point.y)).join(&#x27; &#x27;);
      }

      function compoundPath(polygons) {
        return polygons.filter((polygon) =&gt; polygon.length &gt;= 3).map((polygon) =&gt; pathData(polygon, true)).join(&#x27; &#x27;);
      }

      function setRay(id, camera, angle) {
        const start = map(camera);
        const end = map({
          x: camera.x + far * Math.sin(rad(angle)),
          y: camera.y + far * Math.cos(rad(angle))
        });
        const line = byId(id);
        line.setAttribute(&#x27;x1&#x27;, format(start.x));
        line.setAttribute(&#x27;y1&#x27;, format(start.y));
        line.setAttribute(&#x27;x2&#x27;, format(end.x));
        line.setAttribute(&#x27;y2&#x27;, format(end.y));
      }

      function setCamera(camera) {
        const point = map(camera);
        byId(&#x27;scp-&#x27; + camera.id + &#x27;-camera&#x27;).setAttribute(
          &#x27;transform&#x27;,
          &#x27;translate(&#x27; + format(point.x) + &#x27; &#x27; + format(point.y) + &#x27;) rotate(&#x27; + format(camera.yaw) + &#x27;)&#x27;
        );
        const label = byId(&#x27;scp-&#x27; + camera.id + &#x27;-label&#x27;);
        const left = camera.x &lt; 0;
        label.setAttribute(&#x27;x&#x27;, format(point.x + (left ? -13 : 13)));
        label.setAttribute(&#x27;y&#x27;, format(point.y + 20));
        label.setAttribute(&#x27;text-anchor&#x27;, left ? &#x27;end&#x27; : &#x27;start&#x27;);
      }

      function setTangent(id, camera) {
        const halfLength = 15;
        const start = map({
          x: camera.x - camera.tangent.x * halfLength,
          y: camera.y - camera.tangent.y * halfLength
        });
        const end = map({
          x: camera.x + camera.tangent.x * halfLength,
          y: camera.y + camera.tangent.y * halfLength
        });
        const line = byId(&#x27;scp-&#x27; + id + &#x27;-tangent&#x27;);
        line.setAttribute(&#x27;x1&#x27;, format(start.x));
        line.setAttribute(&#x27;y1&#x27;, format(start.y));
        line.setAttribute(&#x27;x2&#x27;, format(end.x));
        line.setAttribute(&#x27;y2&#x27;, format(end.y));
      }

      function cameraDistance(first, second) {
        return Math.hypot(first.x - second.x, first.y - second.y);
      }

      function setBaseline(id, first, second, distance, labelOffset) {
        const start = map(first);
        const end = map(second);
        const line = byId(&#x27;scp-baseline-&#x27; + id);
        line.setAttribute(&#x27;x1&#x27;, format(start.x));
        line.setAttribute(&#x27;y1&#x27;, format(start.y));
        line.setAttribute(&#x27;x2&#x27;, format(end.x));
        line.setAttribute(&#x27;y2&#x27;, format(end.y));

        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const length = Math.hypot(dx, dy) || 1;
        const label = byId(&#x27;scp-baseline-&#x27; + id + &#x27;-label&#x27;);
        label.setAttribute(&#x27;x&#x27;, format((start.x + end.x) / 2 - dy / length * labelOffset));
        label.setAttribute(&#x27;y&#x27;, format((start.y + end.y) / 2 + dx / length * labelOffset));
        label.textContent = format(distance) + &#x27; mm&#x27;;
      }

      function positiveAngularSweep(startAngle, endAngle) {
        return ((endAngle - startAngle) % 360 + 360) % 360;
      }

      function infiniteLineIntersection(first, firstAngle, second, secondAngle) {
        const firstDirection = {
          x: Math.sin(rad(firstAngle)),
          y: Math.cos(rad(firstAngle))
        };
        const secondDirection = {
          x: Math.sin(rad(secondAngle)),
          y: Math.cos(rad(secondAngle))
        };
        const denominator = cross(firstDirection, secondDirection);
        if (Math.abs(denominator) &lt; 1e-8) return null;
        const offset = {
          x: second.x - first.x,
          y: second.y - first.y
        };
        const firstDistance = cross(offset, secondDirection) / denominator;
        return {
          x: first.x + firstDirection.x * firstDistance,
          y: first.y + firstDirection.y * firstDistance
        };
      }

      function setWholeFov(ls, rs) {
        const leftOuterAngle = ls.yaw - ls.fov / 2;
        const rightOuterAngle = rs.yaw + rs.fov / 2;
        const wholeFov = positiveAngularSweep(leftOuterAngle, rightOuterAngle);
        byId(&#x27;scp-whole-fov-left-angle&#x27;).textContent = (wrap(leftOuterAngle) &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + format(wrap(leftOuterAngle)) + &#x27;°&#x27;;
        byId(&#x27;scp-whole-fov-right-angle&#x27;).textContent = (wrap(rightOuterAngle) &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + format(wrap(rightOuterAngle)) + &#x27;°&#x27;;
        byId(&#x27;scp-whole-fov-value&#x27;).textContent = format(wholeFov) + &#x27;°&#x27;;

        const group = byId(&#x27;scp-whole-fov-angle&#x27;);
        const vertex = infiniteLineIntersection(ls, leftOuterAngle, rs, rightOuterAngle);
        if (!vertex) {
          group.setAttribute(&#x27;display&#x27;, &#x27;none&#x27;);
          return;
        }
        group.removeAttribute(&#x27;display&#x27;);

        const vertexMapped = map(vertex);
        const rayLength = 55;
        const leftEnd = map({
          x: vertex.x + rayLength * Math.sin(rad(leftOuterAngle)),
          y: vertex.y + rayLength * Math.cos(rad(leftOuterAngle))
        });
        const rightEnd = map({
          x: vertex.x + rayLength * Math.sin(rad(rightOuterAngle)),
          y: vertex.y + rayLength * Math.cos(rad(rightOuterAngle))
        });
        const leftLine = byId(&#x27;scp-whole-fov-extension-left&#x27;);
        leftLine.setAttribute(&#x27;x1&#x27;, format(vertexMapped.x));
        leftLine.setAttribute(&#x27;y1&#x27;, format(vertexMapped.y));
        leftLine.setAttribute(&#x27;x2&#x27;, format(leftEnd.x));
        leftLine.setAttribute(&#x27;y2&#x27;, format(leftEnd.y));
        const rightLine = byId(&#x27;scp-whole-fov-extension-right&#x27;);
        rightLine.setAttribute(&#x27;x1&#x27;, format(vertexMapped.x));
        rightLine.setAttribute(&#x27;y1&#x27;, format(vertexMapped.y));
        rightLine.setAttribute(&#x27;x2&#x27;, format(rightEnd.x));
        rightLine.setAttribute(&#x27;y2&#x27;, format(rightEnd.y));

        const arcRadius = 28;
        const arcSteps = Math.max(12, Math.ceil(wholeFov / 5));
        const arcPoints = [];
        for (let index = 0; index &lt;= arcSteps; index += 1) {
          const angle = leftOuterAngle + wholeFov * index / arcSteps;
          arcPoints.push({
            x: vertex.x + arcRadius * Math.sin(rad(angle)),
            y: vertex.y + arcRadius * Math.cos(rad(angle))
          });
        }
        byId(&#x27;scp-whole-fov-arc&#x27;).setAttribute(&#x27;d&#x27;, pathData(arcPoints));
        const vertexMarker = byId(&#x27;scp-whole-fov-vertex&#x27;);
        vertexMarker.setAttribute(&#x27;cx&#x27;, format(vertexMapped.x));
        vertexMarker.setAttribute(&#x27;cy&#x27;, format(vertexMapped.y));
        const labelAngle = leftOuterAngle + wholeFov / 2;
        const labelPoint = map({
          x: vertex.x + 39 * Math.sin(rad(labelAngle)),
          y: vertex.y + 39 * Math.cos(rad(labelAngle))
        });
        const label = byId(&#x27;scp-whole-fov-label&#x27;);
        label.setAttribute(&#x27;x&#x27;, format(labelPoint.x));
        label.setAttribute(&#x27;y&#x27;, format(labelPoint.y + 5));
        label.textContent = format(wholeFov) + &#x27;°&#x27;;
      }

      function cameraVisible(point, camera) {
        const angle = deg(Math.atan2(point.x - camera.x, point.y - camera.y));
        return Math.abs(wrap(angle - camera.yaw)) &lt;= camera.fov / 2 + 1e-8;
      }

      function angularOverlap(first, second, rangeMm) {
        const step = 0.25;
        let count = 0;
        for (let angle = -180; angle &lt; 180; angle += step) {
          const point = {
            x: rangeMm * Math.sin(rad(angle)),
            y: rangeMm * Math.cos(rad(angle))
          };
          if (cameraVisible(point, first) &amp;&amp; cameraVisible(point, second)) count += 1;
        }
        return count * step;
      }

      function forwardRayIntersection(first, firstAngle, second, secondAngle) {
        const firstDirection = {
          x: Math.sin(rad(firstAngle)),
          y: Math.cos(rad(firstAngle))
        };
        const secondDirection = {
          x: Math.sin(rad(secondAngle)),
          y: Math.cos(rad(secondAngle))
        };
        const denominator = cross(firstDirection, secondDirection);
        if (Math.abs(denominator) &lt; 1e-8) return null;
        const offset = {
          x: second.x - first.x,
          y: second.y - first.y
        };
        const firstDistance = cross(offset, secondDirection) / denominator;
        const secondDistance = cross(offset, firstDirection) / denominator;
        if (firstDistance &lt; -1e-7 || secondDistance &lt; -1e-7) return null;
        return {
          x: first.x + firstDirection.x * firstDistance,
          y: first.y + firstDirection.y * firstDistance
        };
      }

      function fovBoundaryIntersections(first, second) {
        const firstAngles = [first.yaw - first.fov / 2, first.yaw + first.fov / 2];
        const secondAngles = [second.yaw - second.fov / 2, second.yaw + second.fov / 2];
        const intersections = [];
        firstAngles.forEach((firstAngle) =&gt; {
          secondAngles.forEach((secondAngle) =&gt; {
            const point = forwardRayIntersection(first, firstAngle, second, secondAngle);
            if (!point) return;
            const duplicate = intersections.some((candidate) =&gt; Math.hypot(candidate.x - point.x, candidate.y - point.y) &lt; 0.1);
            if (!duplicate) intersections.push(point);
          });
        });
        return intersections.sort((a, b) =&gt; {
          const firstDistance = Math.hypot(a.x - first.x, a.y - first.y);
          const secondDistance = Math.hypot(b.x - first.x, b.y - first.y);
          return firstDistance - secondDistance;
        });
      }

      function updateFovBoundaryIntersections(cameras) {
        const markerGroup = byId(&#x27;scp-fov-cross-markers&#x27;);
        markerGroup.replaceChildren();
        const svgNamespace = &#x27;http://www.w3.org/2000/svg&#x27;;
        adjacentFovPairs.forEach(([firstId, secondId]) =&gt; {
          const key = firstId + &#x27;-&#x27; + secondId;
          const intersections = fovBoundaryIntersections(cameras[firstId], cameras[secondId]);
          const pointsCell = byId(&#x27;scp-cross-&#x27; + key + &#x27;-points&#x27;);
          const statusCell = byId(&#x27;scp-cross-&#x27; + key + &#x27;-status&#x27;);
          if (!intersections.length) {
            pointsCell.textContent = &#x27;—&#x27;;
            statusCell.textContent = &#x27;无正向边界交点&#x27;;
            return;
          }
          pointsCell.replaceChildren();
          intersections.forEach((point, index) =&gt; {
            const recorded = centeredPoint(point);
            const line = document.createElement(&#x27;div&#x27;);
            line.textContent = &#x27;P&#x27; + (index + 1) + &#x27; (&#x27; + format(recorded.x) + &#x27;, &#x27; + format(recorded.y) + &#x27;)&#x27;;
            pointsCell.appendChild(line);

            const mapped = map(point);
            const marker = document.createElementNS(svgNamespace, &#x27;g&#x27;);
            marker.setAttribute(&#x27;transform&#x27;, &#x27;translate(&#x27; + format(mapped.x) + &#x27; &#x27; + format(mapped.y) + &#x27;)&#x27;);
            const circle = document.createElementNS(svgNamespace, &#x27;circle&#x27;);
            circle.setAttribute(&#x27;r&#x27;, &#x27;5&#x27;);
            circle.setAttribute(&#x27;class&#x27;, &#x27;fov-intersection&#x27;);
            const label = document.createElementNS(svgNamespace, &#x27;text&#x27;);
            label.setAttribute(&#x27;class&#x27;, &#x27;secondary-label&#x27;);
            label.setAttribute(&#x27;x&#x27;, &#x27;8&#x27;);
            label.setAttribute(&#x27;y&#x27;, &#x27;-7&#x27;);
            label.textContent = firstId.toUpperCase() + &#x27;–&#x27; + secondId.toUpperCase() + &#x27; P&#x27; + (index + 1);
            marker.append(circle, label);
            markerGroup.appendChild(marker);
          });
          statusCell.textContent = intersections.length + &#x27; 个交点&#x27;;
        });
      }

      function setStaticGeometry() {
        byId(&#x27;scp-left-outline&#x27;).setAttribute(&#x27;d&#x27;, pathData(leftOutline));
        byId(&#x27;scp-right-outline&#x27;).setAttribute(&#x27;d&#x27;, pathData(rightOutline));
        byId(&#x27;scp-left-track&#x27;).setAttribute(&#x27;d&#x27;, pathData(leftTrack));
        byId(&#x27;scp-right-track&#x27;).setAttribute(&#x27;d&#x27;, pathData(rightTrack));
        const fillPoints = [
          ...leftOutline,
          ...rightOutline.slice().reverse()
        ];
        byId(&#x27;scp-head-fill&#x27;).setAttribute(&#x27;d&#x27;, pathData(fillPoints, true));

        const xAxisStart = map({ x: -145, y: headCenter.y });
        const xAxisEnd = map({ x: 150, y: headCenter.y });
        const yAxisStart = map({ x: headCenter.x, y: -345 });
        const yAxisEnd = map({ x: headCenter.x, y: 130 });
        const xAxis = byId(&#x27;scp-x-axis&#x27;);
        xAxis.setAttribute(&#x27;x1&#x27;, format(xAxisStart.x));
        xAxis.setAttribute(&#x27;y1&#x27;, format(xAxisStart.y));
        xAxis.setAttribute(&#x27;x2&#x27;, format(xAxisEnd.x));
        xAxis.setAttribute(&#x27;y2&#x27;, format(xAxisEnd.y));
        const yAxis = byId(&#x27;scp-y-axis&#x27;);
        yAxis.setAttribute(&#x27;x1&#x27;, format(yAxisStart.x));
        yAxis.setAttribute(&#x27;y1&#x27;, format(yAxisStart.y));
        yAxis.setAttribute(&#x27;x2&#x27;, format(yAxisEnd.x));
        yAxis.setAttribute(&#x27;y2&#x27;, format(yAxisEnd.y));

        const originPoint = map(headCenter);
        const originMarker = byId(&#x27;scp-origin&#x27;);
        originMarker.setAttribute(&#x27;cx&#x27;, format(originPoint.x));
        originMarker.setAttribute(&#x27;cy&#x27;, format(originPoint.y));
        const originLabel = byId(&#x27;scp-origin-label&#x27;);
        originLabel.setAttribute(&#x27;x&#x27;, format(originPoint.x + 7));
        originLabel.setAttribute(&#x27;y&#x27;, format(originPoint.y - 7));
        const xAxisLabel = byId(&#x27;scp-x-axis-label&#x27;);
        xAxisLabel.setAttribute(&#x27;x&#x27;, format(xAxisEnd.x - 2));
        xAxisLabel.setAttribute(&#x27;y&#x27;, format(xAxisEnd.y - 8));
        xAxisLabel.setAttribute(&#x27;text-anchor&#x27;, &#x27;end&#x27;);
        const yAxisLabel = byId(&#x27;scp-y-axis-label&#x27;);
        yAxisLabel.setAttribute(&#x27;x&#x27;, format(yAxisEnd.x + 7));
        yAxisLabel.setAttribute(&#x27;y&#x27;, format(yAxisEnd.y + 3));

        const tickGroup = byId(&#x27;scp-axis-ticks&#x27;);
        const svgNamespace = &#x27;http://www.w3.org/2000/svg&#x27;;
        [-100, -50, 50, 100].forEach((value) =&gt; {
          const point = map({ x: headCenter.x + value, y: headCenter.y });
          const tick = document.createElementNS(svgNamespace, &#x27;line&#x27;);
          tick.setAttribute(&#x27;x1&#x27;, format(point.x));
          tick.setAttribute(&#x27;y1&#x27;, format(point.y - 4));
          tick.setAttribute(&#x27;x2&#x27;, format(point.x));
          tick.setAttribute(&#x27;y2&#x27;, format(point.y + 4));
          tick.setAttribute(&#x27;class&#x27;, &#x27;coordinate-tick&#x27;);
          tickGroup.appendChild(tick);
          const label = document.createElementNS(svgNamespace, &#x27;text&#x27;);
          label.setAttribute(&#x27;x&#x27;, format(point.x));
          label.setAttribute(&#x27;y&#x27;, format(point.y + 16));
          label.setAttribute(&#x27;text-anchor&#x27;, &#x27;middle&#x27;);
          label.setAttribute(&#x27;class&#x27;, &#x27;secondary-label&#x27;);
          label.textContent = value;
          tickGroup.appendChild(label);
        });
        [-100, 100, 200, 300].forEach((value) =&gt; {
          const point = map({ x: headCenter.x, y: headCenter.y + value });
          const tick = document.createElementNS(svgNamespace, &#x27;line&#x27;);
          tick.setAttribute(&#x27;x1&#x27;, format(point.x - 4));
          tick.setAttribute(&#x27;y1&#x27;, format(point.y));
          tick.setAttribute(&#x27;x2&#x27;, format(point.x + 4));
          tick.setAttribute(&#x27;y2&#x27;, format(point.y));
          tick.setAttribute(&#x27;class&#x27;, &#x27;coordinate-tick&#x27;);
          tickGroup.appendChild(tick);
          const label = document.createElementNS(svgNamespace, &#x27;text&#x27;);
          label.setAttribute(&#x27;x&#x27;, format(point.x + 7));
          label.setAttribute(&#x27;y&#x27;, format(point.y - 4));
          label.setAttribute(&#x27;class&#x27;, &#x27;secondary-label&#x27;);
          label.textContent = value;
          tickGroup.appendChild(label);
        });

        const upperLeft = map({ x: -98, y: -20 });
        const upperRight = map({ x: 98, y: -20 });
        const middleLeft = map({ x: -118, y: -70 });
        const middleRight = map({ x: 118, y: -70 });
        const upper = byId(&#x27;scp-upper-structure&#x27;);
        upper.setAttribute(&#x27;x1&#x27;, format(upperLeft.x));
        upper.setAttribute(&#x27;y1&#x27;, format(upperLeft.y));
        upper.setAttribute(&#x27;x2&#x27;, format(upperRight.x));
        upper.setAttribute(&#x27;y2&#x27;, format(upperRight.y));
        const middle = byId(&#x27;scp-middle-structure&#x27;);
        middle.setAttribute(&#x27;x1&#x27;, format(middleLeft.x));
        middle.setAttribute(&#x27;y1&#x27;, format(middleLeft.y));
        middle.setAttribute(&#x27;x2&#x27;, format(middleRight.x));
        middle.setAttribute(&#x27;y2&#x27;, format(middleRight.y));

        const left = map({ x: -30, y: 24 });
        const right = map({ x: 30, y: 24 });
        const leftBase = map({ x: -30, y: 0 });
        const rightBase = map({ x: 30, y: 0 });
        byId(&#x27;scp-dimension&#x27;).setAttribute(
          &#x27;d&#x27;,
          &#x27;M&#x27; + format(leftBase.x) + &#x27; &#x27; + format(leftBase.y) +
          &#x27; L&#x27; + format(left.x) + &#x27; &#x27; + format(left.y) +
          &#x27; L&#x27; + format(right.x) + &#x27; &#x27; + format(right.y) +
          &#x27; L&#x27; + format(rightBase.x) + &#x27; &#x27; + format(rightBase.y)
        );
        const dimensionLabel = byId(&#x27;scp-dimension-label&#x27;);
        dimensionLabel.setAttribute(&#x27;x&#x27;, format(origin.x));
        dimensionLabel.setAttribute(&#x27;y&#x27;, format(left.y - 8));
        const scaleLabel = byId(&#x27;scp-scale-label&#x27;);
        scaleLabel.setAttribute(&#x27;x&#x27;, format(origin.x));
        scaleLabel.setAttribute(&#x27;y&#x27;, &#x27;824&#x27;);
      }

      function update() {
        const ls = sideCamera(&#x27;ls&#x27;, leftTrack);
        const rs = sideCamera(&#x27;rs&#x27;, rightTrack);
        const cameras = { ...frontCameras, ls, rs };
        const polygons = Object.fromEntries(
          Object.entries(cameras).map(([id, camera]) =&gt; [id, fovPolygon(camera)])
        );

        Object.values(cameras).forEach((camera) =&gt; {
          byId(&#x27;scp-fov-&#x27; + camera.id).setAttribute(&#x27;points&#x27;, pointsAttribute(polygons[camera.id]));
          setRay(&#x27;scp-&#x27; + camera.id + &#x27;-ray-a&#x27;, camera, camera.yaw - halfFov);
          setRay(&#x27;scp-&#x27; + camera.id + &#x27;-ray-b&#x27;, camera, camera.yaw + halfFov);
          setCamera(camera);
          const recorded = centeredPoint(camera);
          byId(&#x27;scp-record-&#x27; + camera.id + &#x27;-x&#x27;).textContent = format(recorded.x);
          byId(&#x27;scp-record-&#x27; + camera.id + &#x27;-y&#x27;).textContent = format(recorded.y);
          byId(&#x27;scp-record-&#x27; + camera.id + &#x27;-yaw&#x27;).textContent = (camera.yaw &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + format(camera.yaw);
        });

        const pairPolygons = pairs.map((pair) =&gt; clipPolygon(polygons[pair[0]], polygons[pair[1]]));
        byId(&#x27;scp-pair-overlap&#x27;).setAttribute(&#x27;d&#x27;, compoundPath(pairPolygons));
        const triplePolygons = triples.map((triple) =&gt; {
          const firstIntersection = clipPolygon(polygons[triple[0]], polygons[triple[1]]);
          return clipPolygon(firstIntersection, polygons[triple[2]]);
        });
        byId(&#x27;scp-multi-overlap&#x27;).setAttribute(&#x27;d&#x27;, compoundPath(triplePolygons));

        setTangent(&#x27;ls&#x27;, ls);
        setTangent(&#x27;rs&#x27;, rs);
        const centerDistances = {
          lfRf: cameraDistance(cameras.lf, cameras.rf),
          lsLf: cameraDistance(cameras.ls, cameras.lf),
          rfRs: cameraDistance(cameras.rf, cameras.rs),
          lsRs: cameraDistance(cameras.ls, cameras.rs)
        };
        byId(&#x27;scp-distance-lf-rf&#x27;).textContent = format(centerDistances.lfRf);
        byId(&#x27;scp-distance-ls-lf&#x27;).textContent = format(centerDistances.lsLf);
        byId(&#x27;scp-distance-rf-rs&#x27;).textContent = format(centerDistances.rfRs);
        byId(&#x27;scp-distance-ls-rs&#x27;).textContent = format(centerDistances.lsRs);
        setBaseline(&#x27;ls-lf&#x27;, cameras.ls, cameras.lf, centerDistances.lsLf, -10);
        setBaseline(&#x27;rf-rs&#x27;, cameras.rf, cameras.rs, centerDistances.rfRs, -10);
        setBaseline(&#x27;ls-rs&#x27;, cameras.ls, cameras.rs, centerDistances.lsRs, 12);
        setWholeFov(ls, rs);
        updateFovBoundaryIntersections(cameras);

        const distanceMeters = Number(byId(&#x27;scp-distance&#x27;).value);
        const distanceMm = distanceMeters * 1000;
        byId(&#x27;scp-distance-value&#x27;).textContent = format(distanceMeters) + &#x27; m&#x27;;
        byId(&#x27;scp-distance&#x27;).setAttribute(&#x27;aria-valuetext&#x27;, format(distanceMeters) + &#x27; m&#x27;);

        [
          { side: ls, front: cameras.lf },
          { side: rs, front: cameras.rf }
        ].forEach(({ side, front }) =&gt; {
          const recorded = centeredPoint(side);
          byId(&#x27;scp-&#x27; + side.id + &#x27;-position-value&#x27;).textContent = format(side.position) + &#x27;%&#x27;;
          byId(&#x27;scp-&#x27; + side.id + &#x27;-offset-value&#x27;).textContent = (side.offset &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + format(side.offset) + &#x27;°&#x27;;
          byId(&#x27;scp-&#x27; + side.id + &#x27;-coordinate&#x27;).textContent = &#x27;(&#x27; + format(recorded.x) + &#x27;, &#x27; + format(recorded.y) + &#x27;) mm&#x27;;
          byId(&#x27;scp-&#x27; + side.id + &#x27;-yaw&#x27;).textContent = (side.yaw &gt; 0 ? &#x27;+&#x27; : &#x27;&#x27;) + format(side.yaw) + &#x27;°&#x27;;
          byId(&#x27;scp-&#x27; + side.id + &#x27;-overlap&#x27;).textContent = format(angularOverlap(side, front, distanceMm)) + &#x27;°&#x27;;
          byId(&#x27;scp-&#x27; + side.id + &#x27;-position&#x27;).setAttribute(&#x27;aria-valuetext&#x27;, format(side.position) + &#x27;%&#x27;);
          byId(&#x27;scp-&#x27; + side.id + &#x27;-offset&#x27;).setAttribute(&#x27;aria-valuetext&#x27;, format(side.offset) + &#x27;°，实际偏航 &#x27; + format(side.yaw) + &#x27;°&#x27;);
        });
      }

      async function exportTransparentPng() {
        const button = byId(&#x27;scp-export-png&#x27;);
        const status = byId(&#x27;scp-export-status&#x27;);
        button.disabled = true;
        status.textContent = &#x27;正在生成…&#x27;;
        try {
          const sourceSvg = byId(&#x27;scp-planner-svg&#x27;);
          const clonedSvg = sourceSvg.cloneNode(true);
          const sourceElements = [sourceSvg, ...sourceSvg.querySelectorAll(&#x27;*&#x27;)];
          const clonedElements = [clonedSvg, ...clonedSvg.querySelectorAll(&#x27;*&#x27;)];
          const copiedProperties = [
            &#x27;color&#x27;,
            &#x27;fill&#x27;,
            &#x27;fill-opacity&#x27;,
            &#x27;stroke&#x27;,
            &#x27;stroke-opacity&#x27;,
            &#x27;stroke-width&#x27;,
            &#x27;stroke-linecap&#x27;,
            &#x27;stroke-linejoin&#x27;,
            &#x27;stroke-dasharray&#x27;,
            &#x27;opacity&#x27;,
            &#x27;font-family&#x27;,
            &#x27;font-size&#x27;,
            &#x27;font-weight&#x27;,
            &#x27;text-anchor&#x27;
          ];
          sourceElements.forEach((element, index) =&gt; {
            const computed = window.getComputedStyle(element);
            const clone = clonedElements[index];
            copiedProperties.forEach((property) =&gt; {
              const value = computed.getPropertyValue(property);
              if (value) clone.style.setProperty(property, value);
            });
          });
          const exportWidth = 1520;
          const exportHeight = 1680;
          clonedSvg.setAttribute(&#x27;xmlns&#x27;, &#x27;http://www.w3.org/2000/svg&#x27;);
          clonedSvg.setAttribute(&#x27;width&#x27;, String(exportWidth));
          clonedSvg.setAttribute(&#x27;height&#x27;, String(exportHeight));

          const serialized = new XMLSerializer().serializeToString(clonedSvg);
          const svgBlob = new Blob([serialized], { type: &#x27;image/svg+xml;charset=utf-8&#x27; });
          const svgUrl = URL.createObjectURL(svgBlob);
          const image = new Image();
          try {
            await new Promise((resolve, reject) =&gt; {
              image.onload = resolve;
              image.onerror = reject;
              image.src = svgUrl;
            });
            const canvas = document.createElement(&#x27;canvas&#x27;);
            canvas.width = exportWidth;
            canvas.height = exportHeight;
            const context = canvas.getContext(&#x27;2d&#x27;);
            context.clearRect(0, 0, exportWidth, exportHeight);
            context.drawImage(image, 0, 0, exportWidth, exportHeight);
            const pngBlob = await new Promise((resolve, reject) =&gt; {
              canvas.toBlob((blob) =&gt; blob ? resolve(blob) : reject(new Error(&#x27;PNG export failed&#x27;)), &#x27;image/png&#x27;);
            });
            const pngUrl = URL.createObjectURL(pngBlob);
            const link = document.createElement(&#x27;a&#x27;);
            const timestamp = new Date().toISOString().slice(0, 19).replaceAll(&#x27;:&#x27;, &#x27;-&#x27;);
            link.href = pngUrl;
            link.download = &#x27;headband-camera-layout-&#x27; + timestamp + &#x27;.png&#x27;;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(pngUrl);
            status.textContent = &#x27;已导出透明 PNG&#x27;;
          } finally {
            URL.revokeObjectURL(svgUrl);
          }
        } catch (error) {
          status.textContent = &#x27;导出失败，请重试&#x27;;
        } finally {
          button.disabled = false;
        }
      }

      function bindPairedInputs(rangeId, numberId) {
        const rangeInput = byId(rangeId);
        const numberInput = byId(numberId);
        const clamp = (value) =&gt; Math.min(Number(rangeInput.max), Math.max(Number(rangeInput.min), value));
        rangeInput.addEventListener(&#x27;input&#x27;, () =&gt; {
          numberInput.value = rangeInput.value;
          update();
        });
        numberInput.addEventListener(&#x27;input&#x27;, () =&gt; {
          if (numberInput.value === &#x27;&#x27;) return;
          const value = Number(numberInput.value);
          if (!Number.isFinite(value)) return;
          rangeInput.value = String(clamp(value));
          update();
        });
        numberInput.addEventListener(&#x27;change&#x27;, () =&gt; {
          const value = Number(numberInput.value);
          const normalized = Number.isFinite(value) ? clamp(value) : Number(rangeInput.value);
          numberInput.value = String(normalized);
          rangeInput.value = String(normalized);
          update();
        });
      }

      setStaticGeometry();
      bindPairedInputs(&#x27;scp-distance&#x27;, &#x27;scp-distance-number&#x27;);
      bindPairedInputs(&#x27;scp-ls-position&#x27;, &#x27;scp-ls-position-number&#x27;);
      bindPairedInputs(&#x27;scp-ls-offset&#x27;, &#x27;scp-ls-offset-number&#x27;);
      bindPairedInputs(&#x27;scp-rs-position&#x27;, &#x27;scp-rs-position-number&#x27;);
      bindPairedInputs(&#x27;scp-rs-offset&#x27;, &#x27;scp-rs-offset-number&#x27;);
      byId(&#x27;scp-export-png&#x27;).addEventListener(&#x27;click&#x27;, exportTransparentPng);
      update();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {

})();
&lt;/script&gt;
